name: Manual Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '要编译的分支或 Tag'
        required: true
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # 根据项目实际情况配置环境，例如 Node.js 或 Python
