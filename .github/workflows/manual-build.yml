name: Manual Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '要编译的分支或 Tag'
        required: true
        default: 'main'
        type: string
      platform:
        description: '目标平台'
        required: true
        default: 'linux/amd64'
        type: choice
        options:
          - linux/amd64
          - linux/arm64

jobs:
  build:
    name: Build (${{ inputs.platform }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # 配置 QEMU 以支持跨平台构建（针对 linux/arm64）
      - name: Set up QEMU
        if: inputs.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      # 根据项目实际情况配置环境，例如 Node.js 或 Python
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'

      - name: Build
        run: |
          echo "正在编译分支/Tag: ${{ inputs.ref }}"
          echo "目标平台: ${{ inputs.platform }}"
          # 在此处添加具体的编译命令，例如：
          # npm ci
          # npm run build
